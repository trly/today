version: v2
inputs:
  - directory: protobuf
plugins:
  - local: [go, tool, protoc-gen-go]
    out: gen
    opt: paths=source_relative
  - local: [go, tool, protoc-gen-connect-go]
    out: gen
    opt:
      - paths=source_relative
      - simple
  - local: [pnpm, exec, protoc-gen-es]
    out: web/src/gen
    opt: target=ts
  - remote: buf.build/community/pseudomuto-doc
    out: docs/api
    opt: markdown,today-v1.md
